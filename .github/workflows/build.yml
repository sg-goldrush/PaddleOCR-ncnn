name: Build

on:
  workflow_dispatch:   # 只在 GitHub 网页上手动点 Run workflow

jobs:
  windows:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
      VCPKG_BUILD_TYPE: release

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install dependencies (vcpkg)
        run: vcpkg install ncnn:x64-windows-static opencv:x64-windows-static

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist/ppocr/models
          Copy-Item build/Release/main.exe dist/ppocr/
          # 修正模型路径: ../models/ → ./models/
          (Get-Content config.json) -replace '"\.\./models/', '"./models/' | Set-Content dist/ppocr/config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddleocr-windows
          path: dist/
