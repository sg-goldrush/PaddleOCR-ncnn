name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (vcpkg)
        run: vcpkg install ncnn:x64-windows opencv:x64-windows

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build/Release/main.exe dist/
          Copy-Item build/Release/*.dll  dist/ -ErrorAction SilentlyContinue
          Copy-Item config.json          dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddleocr-windows
          path: dist/
